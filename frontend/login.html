<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:white;
    padding:35px;
    width:320px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#667eea;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.03);
}

#message{
    margin-top:15px;
    font-size:14px;
}

.back{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#555;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<input id="email" placeholder="Enter Email">

<input id="password" type="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="message"></p>

<a class="back" href="index.html">← Back to Home</a>

</div>

<script src="script.js"></script>

</body>
</html>
