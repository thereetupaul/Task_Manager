<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Tester</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:25px;
}

.btn{
    display:block;
    margin:15px 0;
    padding:12px;
    text-decoration:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.register{
    background:#28a745;
}

.login{
    background:#007bff;
}

.btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:gray;
}

</style>
</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<a class="btn register" href="register.html">Register User</a>

<a class="btn login" href="login.html">Login User</a>

<div class="footer">
Simple UI for testing backend APIs
</div>

</div>

</body>
</html>
